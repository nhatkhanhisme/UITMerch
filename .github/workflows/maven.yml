name: CI / CD — Backend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Job 1: Build & Test ────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run tests
        run: ./mvnw verify -Dspring-boot.run.profiles=dev -B -q

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend/target/surefire-reports/
          retention-days: 7

  # ── Job 2: Build image & Deploy to Railway (main only) ────────────────────
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [ test ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/uitmerch-backend:latest
            ghcr.io/${{ github.repository_owner }}/uitmerch-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Railway redeploy
        run: curl -fsS -X POST "${{ secrets.RAILWAY_WEBHOOK_URL }}"
