dotenv:
  ignoreIfMalformed: true

server:
  port: ${SERVER_PORT:8080}

app:
  # JWT Configuration
  # NFR01: JWT access tokens utilized for session management
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration: ${APP_JWT_EXPIRATION:86400000}  # 24 hours in milliseconds
    refresh-expiration: ${APP_JWT_REFRESH_EXPIRATION:604800000}  # 7 days in milliseconds

  # Supabase Storage Configuration
  # NFR03: Supabase Storage used for images; Base64/BLOB persistence in DB is strictly prohibited
  storage:
    endpoint: ${SUPABASE_STORAGE_ENDPOINT}
    region: ${SUPABASE_STORAGE_REGION}
    access-key: ${SUPABASE_STORAGE_S3_ACCESS_KEY_ID}
    secret-key: ${SUPABASE_STORAGE_S3_SECRET_KEY}
    public-url: ${SUPABASE_PROJECT_URL}

spring:
  application:
    name: uitmerch-backend
  
  # PostgreSQL Datasource Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/uitmerch}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
  
  # JPA & Hibernate Configuration
  # CRITICAL: ddl-auto=none enforces Flyway as the ONLY schema migration tool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
  
  # Flyway Configuration - Strict Schema Versioning
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false
  
  # OpenAPI/Swagger Documentation
  springdoc:
    swagger-ui:
      path: /swagger-ui.html
      persistAuthorization: true
      tryItOutEnabled: true
      enabled: true
    api-docs:
      path: /v3/api-docs
  
  # Logging Configuration
logging:
  level:
    root: INFO
    com.uitmerch: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: DEBUG