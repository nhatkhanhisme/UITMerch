services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: uitmerch-db
    environment:
      POSTGRES_DB: uitmerch
      POSTGRES_USER: uitmerch
      POSTGRES_PASSWORD: uitmerch_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uitmerch -d uitmerch"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Spring Boot backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ''
      dockerfile: Dockerfile
    container_name: uitmerch-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/uitmerch
      SPRING_DATASOURCE_USERNAME: uitmerch
      SPRING_DATASOURCE_PASSWORD: uitmerch_dev
      APP_JWT_SECRET: ${APP_JWT_SECRET} 
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  pgdata:
