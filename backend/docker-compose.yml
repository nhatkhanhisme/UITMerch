services:

  # ── Spring Boot backend ───────────────────────────────────────────────────────
  # Connects to real Supabase (DB + Storage + Mail) via credentials in .env
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uitmerch-backend
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/public/events?size=1 || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
